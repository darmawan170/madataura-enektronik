<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masaji Elektronik - Toko Online</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
<header class="bg-white shadow sticky top-0 p-4 flex justify-between z-40">
  <h1 class="text-2xl font-bold">Masaji Elektronik</h1>
  <button onclick="toggleCart()" class="bg-indigo-600 text-white px-4 py-2 rounded">🛒 Keranjang (<span id="cartCount">0</span>)</button>
</header>

<main class="p-6 max-w-7xl mx-auto"><div id="productGrid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-5"></div></main>

<!-- SIDEBAR KERANJANG + CHECKOUT -->
<div id="cartSidebar" class="fixed right-0 top-0 h-full w-96 max-w-[90vw] bg-white shadow-2xl p-5 hidden z-50 overflow-y-auto">
  <div class="flex justify-between"><h2 class="font-bold text-xl">Checkout</h2><button onclick="toggleCart()">✕</button></div>

  <!-- DATA CUSTOMER -->
  <div class="mt-4 space-y-2">
    <input id="cNama" placeholder="Nama Penerima *" class="w-full border p-2 rounded" required>
    <input id="cWA" placeholder="No WA 08xxx *" class="w-full border p-2 rounded" required>
    <input id="cEmail" type="email" placeholder="Email Gmail" class="w-full border p-2 rounded">
    <textarea id="cAlamat" placeholder="Alamat Lengkap *" class="w-full border p-2 rounded" required></textarea>
    <div class="grid grid-cols-2 gap-2">
      <input id="cRT" placeholder="RT/RW" class="border p-2 rounded">
      <input id="cKel" placeholder="Kelurahan" class="border p-2 rounded">
    </div>
    <div class="grid grid-cols-2 gap-2">
      <input id="cKec" placeholder="Kecamatan" class="border p-2 rounded">
      <input id="cKota" placeholder="Kota/Kabupaten *" class="border p-2 rounded" required>
    </div>
    <input id="cKodepos" placeholder="Kode Pos" class="w-full border p-2 rounded">
  </div>

  <!-- PILIH EKSPEDISI -->
  <div class="mt-3">
    <label class="text-sm font-bold">Pilih Ekspedisi</label>
    <select id="cEkspedisi" class="w-full border p-2 rounded">
      <option value="JNE">JNE</option>
      <option value="J&T">J&T</option>
      <option value="SiCepat">SiCepat</option>
    </select>
    <p class="text-xs text-gray-500">Ongkir estimasi: Rp 15.000</p>
  </div>

  <!-- VOUCHER -->
  <div class="mt-3">
    <label class="text-sm font-bold">Kode Voucher</label>
    <div class="flex gap-2">
      <input id="inputVoucher" placeholder="PROMO10RB" class="w-full border p-2 rounded uppercase">
      <button type="button" onclick="pakaiVoucher()" class="bg-green-600 text-white px-3 rounded">Pakai</button>
    </div>
    <p id="infoVoucher" class="text-xs text-green-600 mt-1"></p>
  </div>

  <!-- RINCIAN -->
  <div id="cartItems" class="my-3 border-t pt-2"></div>
  <p class="font-bold">Subtotal: Rp <span id="subTotal">0</span></p>
  <p class="font-bold">Diskon: -Rp <span id="diskonEl">0</span></p>
  <p class="font-bold">Ongkir: Rp <span id="ongkir">15000</span></p>
  <p class="font-bold text-lg border-t mt-2 pt-2">Total: Rp <span id="totalPrice">0</span></p>
  <button onclick="checkoutWA()" class="bg-green-600 text-white w-full py-3 rounded mt-3 font-bold">Kirim Pesanan WA</button>
</div>
<div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/30 hidden z-40"></div>

<script>
const KEY_PROD = 'masaji_products';
const KEY_VOU = 'masaji_vouchers';
const WA_NUMBER = "6288994657745";
let products = [], cart = [], vouchers = [], voucherAktif = null, diskon = 0;
const ONGKIR = 15000;

function getData(){
  products = JSON.parse(localStorage.getItem(KEY_PROD)) || [];
  vouchers = JSON.parse(localStorage.getItem(KEY_VOU)) || [];
}

function loadProducts(){
  getData();
  productGrid.innerHTML = "";
  if(products.length==0){
    productGrid.innerHTML = `<p class="col-span-4 text-center text-gray-500">Belum ada produk. Buka admin.html</p>`;
    return;
  }
  products.forEach(p => {
    productGrid.innerHTML += `<div class="bg-white p-3 rounded shadow">
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300'" class="w-full h-40 object-cover rounded">
      <h3 class="font-bold mt-2">${p.name}</h3>
      <p class="text-sm">Stok: ${p.stock} | Terjual: ${p.sold||0}</p>
      <p class="font-bold text-indigo-600">Rp ${Number(p.price).toLocaleString('id-ID')}</p>
      <button onclick="addToCart('${p.id}')" ${p.stock==0?'disabled':''} class="bg-indigo-600 text-white w-full py-1 rounded mt-1 disabled:bg-gray-400">${p.stock==0?'Stok Habis':'+ Keranjang'}</button>
    </div>`;
  });
}

function addToCart(id){
  getData();
  const p = products.find(x=>String(x.id)==String(id));
  if(!p || p.stock<=0) return alert('Stok habis');
  const item = cart.find(i=>String(i.id)==String(id));
  if(item) item.qty++; else cart.push({id, qty:1});
  renderCart();
}

function renderCart(){
  let sub = 0, count=0;
  cartItems.innerHTML = "";
  if(cart.length==0){
    cartItems.innerHTML = '<p class="text-center text-gray-400">Keranjang kosong</p>';
  }
  cart.forEach(i=>{
    const p = products.find(pr=>String(pr.id)==String(i.id));
    if(!p) return;
    const total = p.price * i.qty; sub += total; count+=i.qty;
    cartItems.innerHTML += `<div class="flex justify-between text-sm">${p.name} x${i.qty} <span>Rp ${total.toLocaleString('id-ID')}</span></div>`;
  });
  document.getElementById('subTotal').innerText = sub.toLocaleString('id-ID');
  document.getElementById('cartCount').innerText = count;
  hitungTotal(sub);
}

function hitungTotal(sub){
  const total = sub - diskon + ONGKIR;
  document.getElementById('totalPrice').innerText = total.toLocaleString('id-ID');
  document.getElementById('ongkir').innerText = ONGKIR.toLocaleString('id-ID');
  document.getElementById('diskonEl').innerText = diskon.toLocaleString('id-ID'); // FIX: ini yang error
}

function pakaiVoucher(){
  getData();
  const kode = document.getElementById('inputVoucher').value.toUpperCase();
  const v = vouchers.find(x=>x.code==kode && x.kuota>0);
  if(!v) return alert('Voucher tidak valid atau kuota habis');
  voucherAktif = v; diskon = v.diskon;
  document.getElementById('infoVoucher').innerText = `Voucher ${v.code} aktif! Diskon Rp ${v.diskon.toLocaleString('id-ID')}`;
  renderCart();
}

function checkoutWA(){
  if(!document.getElementById('cNama').value ||!document.getElementById('cWA').value ||!document.getElementById('cAlamat').value)
    return alert('Lengkapi Nama, No WA, dan Alamat');
  if(cart.length==0) return alert('Keranjang kosong');

  getData();
  let msg = `*PESAN BARU MASAAJI*%0A%0A`;
  msg += `*Data Penerima*%0A`;
  msg += `Nama: ${document.getElementById('cNama').value}%0A`;
  msg += `WA: ${document.getElementById('cWA').value}%0A`;
  msg += `Email: ${document.getElementById('cEmail').value}%0A`;
  msg += `Alamat: ${document.getElementById('cAlamat').value}, RT${document.getElementById('cRT').value}, ${document.getElementById('cKel').value}%0A`;
  msg += `${document.getElementById('cKec').value}, ${document.getElementById('cKota').value}, ${document.getElementById('cKodepos').value}%0A%0A`;

  msg += `*Produk*%0A`;
  let sub = 0;
  cart.forEach(i=>{
    const p = products.find(pr=>String(pr.id)==String(i.id));
    p.stock -= i.qty; p.sold = (p.sold||0)+i.qty;
    const total = p.price*i.qty; sub+=total;
    msg += `- ${p.name} x${i.qty} = Rp ${total.toLocaleString('id-ID')}%0A`;
  });

  if(voucherAktif){
    voucherAktif.kuota -= 1;
    msg += `Voucher: ${voucherAktif.code} -Rp${voucherAktif.diskon.toLocaleString('id-ID')}%0A`;
  }
  msg += `Ekspedisi: ${document.getElementById('cEkspedisi').value} Rp${ONGKIR.toLocaleString('id-ID')}%0A`;
  msg += `*TOTAL BAYAR: Rp${(sub-diskon+ONGKIR).toLocaleString('id-ID')}*`;

  localStorage.setItem(KEY_PROD, JSON.stringify(products));
  localStorage.setItem(KEY_VOU, JSON.stringify(vouchers));
  localStorage.setItem('masaji_update', Date.now().toString());

  window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
  cart=[]; voucherAktif=null; diskon=0;
  document.getElementById('infoVoucher').innerText="";
  document.getElementById('inputVoucher').value="";
  renderCart(); loadProducts(); toggleCart();
}

function toggleCart(){
  document.getElementById('cartSidebar').classList.toggle('hidden');
  document.getElementById('overlay').classList.toggle('hidden');
}

window.addEventListener('storage', e=>{ if(e.key=='masaji_update') loadProducts(); });
loadProducts();
</script>
</body>
</html>
