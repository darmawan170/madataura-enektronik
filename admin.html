<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Masaji Elektronik</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6">
<div class="max-w-6xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Dashboard Admin Masaji</h1>
    <a href="index.html" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm">Lihat Toko ↗</a>
  </div>

  <div class="grid lg:grid-cols-3 gap-6">
    <div class="bg-white p-5 rounded-xl shadow lg:col-span-1 h-fit">
      <h2 class="font-bold mb-4 text-lg">Tambah / Edit Produk</h2>
      <form id="productForm" class="space-y-3">
        <input type="hidden" id="productId">
        <div>
          <label class="text-xs font-medium">Nama Produk *</label>
          <input id="name" placeholder="Contoh: Kipas Angin Miyako" class="w-full border p-2.5 rounded-lg" required>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div><label class="text-xs font-medium">Harga (Rp)</label><input id="price" type="number" min="0" class="w-full border p-2.5 rounded-lg" required></div>
          <div><label class="text-xs font-medium">Stok</label><input id="stock" type="number" min="0" class="w-full border p-2.5 rounded-lg" required></div>
        </div>
        <div><label class="text-xs font-medium">Link Gambar</label><input id="img" placeholder="https://i.imgur.com/xxx.jpg" class="w-full border p-2.5 rounded-lg" required></div>
        <div><label class="text-xs font-medium">Deskripsi</label><textarea id="desc" class="w-full border p-2.5 rounded-lg h-20"></textarea></div>
        <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-lg w-full font-medium">Simpan Produk</button>
        <button type="button" id="cancelBtn" class="w-full py-2 text-sm text-gray-500 hidden">Batal Edit</button>
      </form>
    </div>

    <div class="bg-white p-5 rounded-xl shadow lg:col-span-2">
      <h2 class="font-bold text-lg mb-4">Daftar Produk (<span id="count">0</span>)</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm"><thead><tr class="text-left border-b text-gray-500"><th class="pb-2">Produk</th><th>Harga</th><th>Stok</th><th>Aksi</th></tr></thead><tbody id="productList"></tbody></table>
      </div>
    </div>
  </div>
</div>

<script>
const KEY = 'masaji_products';
let products = [];

const elList = document.getElementById('productList');
const elCount = document.getElementById('count');

function getProducts() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { return []; }
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(products));
  localStorage.setItem('masaji_update', Date.now().toString());
  loadProducts();
}

function loadProducts() {
  products = getProducts();
  elCount.innerText = products.length;
  elList.innerHTML = "";
  if(products.length === 0) {
    elList.innerHTML = `<tr><td colspan="4" class="text-center py-10 text-gray-400">Belum ada produk</td></tr>`;
    return;
  }
  products.forEach((p) => {
    const realIndex = products.findIndex(x => String(x.id) === String(p.id)); // FIX: pakai String()
    elList.innerHTML += `
      <tr class="border-b hover:bg-slate-50">
        <td class="p-2 flex gap-2 items-center">
          <img src="${p.img}" onerror="this.src='https://via.placeholder.com/100'" class="w-12 h-12 object-cover rounded">
          <div><p class="font-medium">${p.name}</p><p class="text-[11px] text-gray-400">Terjual: ${p.sold||0}</p></div>
        </td>
        <td class="p-2">Rp ${Number(p.price).toLocaleString('id-ID')}</td>
        <td class="p-2">${p.stock}</td>
        <td class="p-2">
          <button onclick="editProduct(${realIndex})" class="bg-yellow-500 hover:bg-yellow-600 px-2.5 py-1 rounded text-white text-xs">Edit</button>
          <button onclick="deleteProduct(${realIndex})" class="bg-red-500 hover:bg-red-600 px-2.5 py-1 rounded text-white text-xs">Hapus</button>
        </td>
      </tr>
    `;
  });
}

document.getElementById('productForm').onsubmit = (e) => {
  e.preventDefault();
  const idVal = document.getElementById('productId').value;
  const id = idVal? idVal : Date.now().toString();

  const dataLama = products.find(p => String(p.id) === String(id)); // FIX: cari data lama

  const data = {
    id: id,
    name: document.getElementById('name').value.trim(), // FIX:.trim() biar gak spasi doang
    price: Math.max(0, Number(document.getElementById('price').value)),
    stock: Math.max(0, Number(document.getElementById('stock').value)),
    desc: document.getElementById('desc').value.trim(),
    img: document.getElementById('img').value.trim(),
    sold: dataLama? (dataLama.sold||0) : 0 // FIX: jangan reset sold pas edit
  };

  if(!data.name) return alert('Nama produk wajib diisi!');

  const index = products.findIndex(p => String(p.id) === String(id));
  if(index > -1) products[index] = data; else products.push(data);

  e.target.reset();
  document.getElementById('productId').value = "";
  document.getElementById('cancelBtn').classList.add('hidden');
  save();
  alert('Produk berhasil disimpan!');
};

function deleteProduct(i) { if(confirm('Hapus produk ini?')) { products.splice(i,1); save(); } }
function editProduct(i) {
  const p = products[i];
  document.getElementById('productId').value = p.id;
  document.getElementById('name').value = p.name;
  document.getElementById('price').value = p.price;
  document.getElementById('stock').value = p.stock;
  document.getElementById('desc').value = p.desc||'';
  document.getElementById('img').value = p.img;
  document.getElementById('cancelBtn').classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}
document.getElementById('cancelBtn').onclick = () => {
  document.getElementById('productForm').reset();
  document.getElementById('productId').value = "";
  document.getElementById('cancelBtn').classList.add('hidden');
}

loadProducts();
</script>
</body>
</html>      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm"><thead><tr class="text-left border-b text-gray-500"><th class="pb-2">Produk</th><th>Harga</th><th>Stok</th><th>Aksi</th></tr></thead><tbody id="productList"></tbody></table>
      </div>
    </div>
  </div>
</div>

<script>
const KEY = 'masaji_products';
let products = [];

const elList = document.getElementById('productList');
const elCount = document.getElementById('count');
const elSearch = document.getElementById('search');
const elPreview = document.getElementById('previewImg');

function getProducts() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { return []; }
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(products));
  localStorage.setItem('masaji_update', Date.now().toString());
  loadProducts();
}
function escapeHTML(str = "") {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function loadProducts() {
  products = getProducts();
  const q = elSearch.value.toLowerCase();
  const filtered = products.filter(p => p.name.toLowerCase().includes(q));
  elCount.innerText = products.length;
  elList.innerHTML = "";
  if(filtered.length === 0) {
    elList.innerHTML = `<tr><td colspan="4" class="text-center py-10 text-gray-400">Tidak ada produk</td></tr>`;
    return;
  }
  filtered.forEach((p) => {
    const realIndex = products.findIndex(x => x.id === p.id);
    const tr = document.createElement('tr');
    tr.className = "border-b hover:bg-slate-50";
    tr.innerHTML = `
      <td class="p-2 flex gap-2 items-center">
        <img src="${escapeHTML(p.img)}" onerror="this.src='https://via.placeholder.com/100'" class="w-12 h-12 object-cover rounded bg-slate-100">
        <div>
          <p class="font-medium">${escapeHTML(p.name)}</p>
          <p class="text-xs text-gray-500 line-clamp-1">${escapeHTML(p.desc||'')}</p>
          <p class="text-[11px] text-gray-400">Terjual: ${p.sold||0}</p>
        </div>
      </td>
      <td class="p-2">Rp ${Number(p.price).toLocaleString('id-ID')}</td>
      <td class="p-2"><span class="px-2 py-1 rounded text-xs ${p.stock==0?'bg-red-100 text-red-600':'bg-green-100 text-green-700'}">${p.stock}</span></td>
      <td class="p-2">
        <div class="flex gap-1">
          <button class="btn-edit bg-yellow-500 hover:bg-yellow-600 px-2.5 py-1 rounded text-white text-xs">Edit</button>
          <button class="btn-del bg-red-500 hover:bg-red-600 px-2.5 py-1 rounded text-white text-xs">Hapus</button>
        </div>
      </td>
    `;
    tr.querySelector('.btn-edit').onclick = () => editProduct(realIndex);
    tr.querySelector('.btn-del').onclick = () => deleteProduct(realIndex);
    elList.appendChild(tr);
  });
}

document.getElementById('img').addEventListener('input', (e) => {
  if(e.target.value.startsWith('http')) {
    elPreview.src = e.target.value;
    elPreview.classList.remove('hidden');
  }
});

document.getElementById('productForm').onsubmit = (e) => {
  e.preventDefault();
  const idVal = document.getElementById('productId').value;
  const id = idVal ? idVal : Date.now().toString();
  
  const dataLama = products.find(p => String(p.id) === String(id));

  const data = {
    id: id,
    name: document.getElementById('name').value.trim(),
    price: Math.max(0, Number(document.getElementById('price').value)),
    stock: Math.max(0, Number(document.getElementById('stock').value)),
    desc: document.getElementById('desc').value.trim(),
    img: document.getElementById('img').value.trim(),
    sold: dataLama ? (dataLama.sold||0) : 0
  };
  
  if(!data.name || !data.img) return alert('Lengkapi data');
  
  const index = products.findIndex(p => String(p.id) === String(id));
  if(index > -1) products[index] = data; else products.push(data);
  
  e.target.reset();
  document.getElementById('productId').value = "";
  elPreview.classList.add('hidden');
  document.getElementById('cancelBtn').classList.add('hidden');
  save();
};

function deleteProduct(i) {
  if(confirm('Hapus produk ini?')) {
    products.splice(i,1);
    save();
  }
}
function editProduct(i) {
  const p = products[i];
  document.getElementById('productId').value = p.id;
  document.getElementById('name').value = p.name;
  document.getElementById('price').value = p.price;
  document.getElementById('stock').value = p.stock;
  document.getElementById('desc').value = p.desc||'';
  document.getElementById('img').value = p.img;
  elPreview.src = p.img;
  elPreview.classList.remove('hidden');
  document.getElementById('cancelBtn').classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}
document.getElementById('cancelBtn').onclick = () => {
  document.getElementById('productForm').reset();
  document.getElementById('productId').value = "";
  elPreview.classList.add('hidden');
  document.getElementById('cancelBtn').classList.add('hidden');
}
elSearch.oninput = loadProducts;

loadProducts();
</script>
</body>
</html>
