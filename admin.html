<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Masaji Elektronik</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6">
<h1 class="text-3xl font-bold mb-4">Dashboard Admin Masaji</h1>
<a href="index.html" target="_blank" class="bg-blue-600 text-white px-3 py-1 rounded text-sm mb-4 inline-block">Lihat Toko</a>

<div class="grid lg:grid-cols-2 gap-6">
  <div class="bg-white p-4 rounded-xl shadow">
    <h2 class="font-bold mb-3">Tambah/Edit Produk</h2>
    <form id="productForm">
      <input type="hidden" id="productId">
      <input id="name" placeholder="Nama Produk" class="w-full border p-2 rounded mb-2" required>
      <input id="price" type="number" placeholder="Harga" class="w-full border p-2 rounded mb-2" required>
      <input id="stock" type="number" placeholder="Stok" class="w-full border p-2 rounded mb-2" required>
      <input id="img" placeholder="Link Gambar Imgur" class="w-full border p-2 rounded mb-2" required>
      <textarea id="desc" placeholder="Deskripsi" class="w-full border p-2 rounded mb-2"></textarea>
      <button class="bg-indigo-600 text-white px-4 py-2 rounded w-full">Simpan Produk</button>
    </form>
    <p class="text-xs mt-2">Upload gambar: <a href="https://imgur.com" target="_blank" class="text-blue-500">imgur.com</a> → copy "Direct Link"</p>
  </div>

  <div class="bg-white p-4 rounded-xl shadow">
    <h2 class="font-bold mb-3">Daftar Produk</h2>
    <table class="w-full text-sm"><thead><tr class="text-left"><td>Gambar</td><td>Nama</td><td>Harga</td><td>Aksi</td></tr></thead><tbody id="productList"></tbody></table>
  </div>
</div>

<script>
const KEY = 'masaji_products';
let products = JSON.parse(localStorage.getItem(KEY)) || [];

function save() {
  localStorage.setItem(KEY, JSON.stringify(products));
  localStorage.setItem('masaji_update', Date.now()); // Kasih sinyal ke index buat refresh
  loadProducts();
}

function loadProducts() {
  productList.innerHTML = "";
  products.forEach((p, i) => {
    productList.innerHTML += `<tr class="border-b">
      <td><img src="${p.img}" class="w-12 h-12 object-cover rounded"></td>
      <td class="p-2">${p.name}<br><span class="text-xs text-gray-500">Stok:${p.stock} | Terjual:${p.sold||0}</span></td>
      <td>Rp ${p.price.toLocaleString('id-ID')}</td>
      <td>
        <button onclick="editProduct(${i})" class="bg-yellow-500 px-2 py-1 rounded text-white text-xs">Edit</button>
        <button onclick="deleteProduct(${i})" class="bg-red-500 px-2 py-1 rounded text-white text-xs">Hapus</button>
      </td>
    </tr>`;
  });
}

productForm.onsubmit = (e) => {
  e.preventDefault();
  const id = productId.value || Date.now();
  
  // FIX: Ambil data lama dulu biar "sold" nya gak ke-reset pas edit
  const dataLama = products.find(p => p.id == id);
  
  const data = {
    id, 
    name: name.value, 
    price: +price.value, 
    stock: +stock.value, 
    desc: desc.value, 
    img: img.value, 
    sold: dataLama ? dataLama.sold : 0 // kalau edit, pakai sold lama. kalau baru, 0
  };
  
  const index = products.findIndex(p => p.id == id);
  if(index > -1) products[index] = data; else products.push(data);
  
  alert('Produk Tersimpan'); 
  productForm.reset(); 
  productId.value = "";
  save();
}

function deleteProduct(i) { if(confirm('Hapus produk ini?')) { products.splice(i,1); save(); } }

function editProduct(i) {
  const p = products[i];
  productId.value = p.id; 
  name.value = p.name; 
  price.value = p.price; 
  stock.value = p.stock; 
  desc.value = p.desc; 
  img.value = p.img;
  window.scrollTo(0,0); // Auto scroll ke atas ke form
}

loadProducts();
</script>
</body>
</html>
